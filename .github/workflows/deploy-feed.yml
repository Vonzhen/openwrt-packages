name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openwrt-apk-feed
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Collect Repository and Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          INPUT_DIR="$RUNNER_TEMP/feed-input"
          rm -rf "$INPUT_DIR"
          mkdir -p "$INPUT_DIR"

          shopt -s nullglob
          shinra=("$GITHUB_WORKSPACE"/packages/luci-app-shinra*.apk)
          [[ ${#shinra[@]} -ge 1 ]] || { echo '错误：仓库中没有 Shinra APK'; exit 1; }
          cp "${shinra[@]}" "$INPUT_DIR/"

          echo '==== 下载 sing-box 稳定版和最新发布版 ===='
          STABLE_SINGBOX=$(gh api repos/SagerNet/sing-box/releases/latest --jq '.tag_name')
          LATEST_SINGBOX=$(gh api repos/SagerNet/sing-box/releases --jq '[.[] | select(.draft == false)][0].tag_name')
          [[ -n "$STABLE_SINGBOX" && -n "$LATEST_SINGBOX" ]] || { echo '错误：无法确定 sing-box 发布版本'; exit 1; }

          gh release download "$STABLE_SINGBOX" -R SagerNet/sing-box \
            -p '*openwrt_x86_64.apk' --clobber -D "$INPUT_DIR"
          if [[ "$STABLE_SINGBOX" != "$LATEST_SINGBOX" ]]; then
            gh release download "$LATEST_SINGBOX" -R SagerNet/sing-box \
              -p '*openwrt_x86_64.apk' --clobber -D "$INPUT_DIR"
          fi

          echo '==== 下载 npc 及其 LuCI 包 ===='
          gh release download -R djylb/nps-openwrt -p 'luci-app-npc*.apk' --clobber -D "$INPUT_DIR"
          gh release download -R djylb/nps-openwrt -p 'luci-i18n-npc*.apk' --clobber -D "$INPUT_DIR"
          gh release download -R djylb/nps-openwrt -p 'npc-*_amd64.apk' --clobber -D "$INPUT_DIR"

          apks=("$INPUT_DIR"/*.apk)
          [[ ${#apks[@]} -ge 5 ]] || { echo "错误：APK 数量不足 (${#apks[@]})"; exit 1; }
          for file in "${apks[@]}"; do
            [[ -s "$file" ]] || { echo "错误：下载到空文件 $file"; exit 1; }
            magic=$(od -An -tx1 -N4 "$file" | tr -d ' \n')
            [[ "$magic" == '41444264' ]] || { echo "错误：不是 APK v3 文件 $file"; exit 1; }
            sha256sum "$file"
          done

      - name: Normalize, Index and Verify Repository
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$APK_PRIVATE_KEY" > repo_private_key.pem
          chmod 600 repo_private_key.pem
          trap 'rm -f repo_private_key.pem' EXIT

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -v "$RUNNER_TEMP/feed-input:/input:ro" \
            alpine:edge@sha256:9a341ff2287c54b86425cbee0141114d811ae69d88a36019087be6d896cef241 \
            sh -euxc '
              apk add --no-cache jq busybox-extras
              sh /work/.github/scripts/build-feed.sh /input /work
            '

      - name: Verify Published Directory
        run: |
          set -euo pipefail
          PACKAGE_DIR="$GITHUB_WORKSPACE/packages"
          shopt -s nullglob

          apks=("$PACKAGE_DIR"/*.apk)
          [[ ${#apks[@]} -ge 5 ]] || { echo "失败：最终 APK 数量不足 (${#apks[@]})"; exit 1; }
          [[ -s "$PACKAGE_DIR/packages.adb" ]] || { echo '失败：packages.adb 丢失或为空'; exit 1; }
          [[ ! -e "$PACKAGE_DIR/packages.adb.new" ]] || { echo '失败：临时索引残留'; exit 1; }

          for file in "${apks[@]}"; do
            [[ -s "$file" ]] || { echo "失败：发现空 APK $file"; exit 1; }
            [[ "$(basename "$file")" != *_openwrt_x86_64.apk ]]
            [[ "$(basename "$file")" != *_amd64.apk ]]
            [[ "$(basename "$file")" != *_all.apk ]]
          done
          echo '仓库最终目录检查通过'

      - name: Commit and Push to Master
        run: |
          set -euo pipefail
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add packages/
          if ! git diff --staged --quiet; then
            git commit -m 'Automated normalization, strict verification and sync'
            git push origin master
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
          clean: true
