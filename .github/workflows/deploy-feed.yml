name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点自动同步
  workflow_dispatch:

permissions:
  contents: write

# 加入全局重试策略，应对 GitHub 官方服务器不稳定的情况
defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 如果因为服务器问题失败，最多重试 3 次
          retries: 3 

      - name: Sync Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p packages
          cd packages
          
          echo "==== 开始抓取 sing-box ===="
          # 匹配规则：*openwrt_x86_64.apk
          gh release download SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber || echo "sing-box 暂无新版"
          
          echo "==== 开始抓取 nps-openwrt ===="
          # 匹配规则：抓取包含 luci-app-npc、luci-i18n-npc 以及 npc 的 x86_64/amd64 相关包
          gh release download djylb/nps-openwrt -p "luci-app-npc*.apk" --clobber || echo "luci-app-npc 下载失败"
          gh release download djylb/nps-openwrt -p "luci-i18n-npc*.apk" --clobber || echo "luci-i18n-npc 下载失败"
          gh release download djylb/nps-openwrt -p "npc-*_amd64.apk" --clobber || echo "npc_amd64 下载失败"

      - name: Generate and Sign ADB Index
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" > /tmp/repo_private_key.pem
          chmod 600 /tmp/repo_private_key.pem
          
          # 使用 OpenWrt 官方的 ImageBuilder 镜像，降维打击
          docker run --rm -v $(pwd):/work -v /tmp:/tmp ghcr.io/openwrt/imagebuilder:x86-64 bash -c '
            cd /work/packages
            
            # 自动在 OpenWrt 官方编译环境中寻找对应的 apk v3 工具
            APK_BIN=$(find /builder/staging_dir -name apk -type f -executable | head -n 1)
            
            if [ -z "$APK_BIN" ]; then
              echo "未找到 staging_dir 里的 apk 工具，尝试调用全局 apk"
              APK_BIN="apk"
            fi
            
            echo "正在使用纯正 OpenWrt v3 打包工具: $APK_BIN"
            
            # 关键改变：使用 mkndx 命令和 --sign 参数生成最新的 packages.adb
            "$APK_BIN" mkndx --sign /tmp/repo_private_key.pem --output packages.adb *.apk
          '
          
          rm -f /tmp/repo_private_key.pem

      - name: Commit and Push to Master
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/
          # 只有当文件夹内真的下载了新包或更新了索引，才提交代码
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动同步第三方最新的 APK 软件包" && git push origin master)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
