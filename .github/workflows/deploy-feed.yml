name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean up old shinra versions
        run: |
          set -euo pipefail
          mkdir -p packages
          cd packages
          
          echo "==== 开始检查 shinra 插件版本 ===="
          shopt -s nullglob
          files=(luci-app-shinra*.apk)
          
          if [ ${#files[@]} -gt 1 ]; then
            echo "发现多个 shinra 版本，开始自动清理旧版..."
            newest=$(ls -1v luci-app-shinra*.apk | tail -n 1)
            echo "保留最新版: $newest"
            for f in "${files[@]}"; do
              if [ "$f" != "$newest" ]; then
                echo "删除旧版: $f"
                rm -f "$f"
              fi
            done
          else
            echo "未发现冗余版本，无需清理。"
          fi

      - name: Sync Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE_DIR="$GITHUB_WORKSPACE/packages"
          TEMP_DIR="$(mktemp -d)"
          
          # 无论成功失败，退出时自动清理临时目录
          trap 'rm -rf "$TEMP_DIR"' EXIT
          
          echo "==== 开始查询并下载新版 APK 到临时目录 ===="
          
          # 1. 抓取 sing-box 稳定版
          STABLE_SINGBOX=$(gh api repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          gh release download "$STABLE_SINGBOX" -R SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber -D "$TEMP_DIR"
          
          # 2. 抓取 sing-box 最新时间线版本
          LATEST_SINGBOX=$(gh api repos/SagerNet/sing-box/releases | jq -r '.[0].tag_name')
          if [ "$STABLE_SINGBOX" != "$LATEST_SINGBOX" ]; then
            gh release download "$LATEST_SINGBOX" -R SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber -D "$TEMP_DIR"
          fi
          
          # 3. 抓取 nps-openwrt
          gh release download -R djylb/nps-openwrt -p "luci-app-npc*.apk" --clobber -D "$TEMP_DIR"
          gh release download -R djylb/nps-openwrt -p "luci-i18n-npc*.apk" --clobber -D "$TEMP_DIR"
          gh release download -R djylb/nps-openwrt -p "npc-*_amd64.apk" --clobber -D "$TEMP_DIR"
          
          echo "==== 校验临时目录下载完整性 ===="
          shopt -s nullglob
          tmp_apks=("$TEMP_DIR"/*.apk)
          if [ ${#tmp_apks[@]} -lt 4 ]; then
            echo "错误：下载的 APK 数量不足，预期至少 4 个，实际 ${#tmp_apks[@]} 个"
            exit 1
          fi
          
          for file in "${tmp_apks[@]}"; do
            test -s "$file" || { echo "错误：下载到空文件 $file"; exit 1; }
          done
          
          echo "==== 校验通过，清理旧版自动同步软件 ===="
          rm -f \
            "$PACKAGE_DIR"/sing-box_*openwrt_x86_64.apk \
            "$PACKAGE_DIR"/npc-*_amd64.apk \
            "$PACKAGE_DIR"/luci-app-npc*.apk \
            "$PACKAGE_DIR"/luci-i18n-npc*.apk
            
          echo "==== 将新版 APK 移入正式目录 ===="
          mv "$TEMP_DIR"/*.apk "$PACKAGE_DIR"/

      - name: Generate and Sign ADB Index
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          
          # 安全写入私钥并设置权限
          printf '%s\n' "$APK_PRIVATE_KEY" > repo_private_key.pem
          chmod 600 repo_private_key.pem
          
          # 确保运行结束后私钥被销毁
          trap 'rm -f repo_private_key.pem' EXIT
          
          # 注意：纯正的 Alpine Edge (APK v3 mkndx) 支持的签名参数确认为 --sign
          docker run --rm -v "$GITHUB_WORKSPACE":/work alpine:edge sh -c "
            set -euo pipefail
            apk add --no-cache --upgrade apk-tools
            cd /work/packages
            echo '正在生成临时索引 packages.adb.new ...'
            apk --allow-untrusted mkndx --sign /work/repo_private_key.pem --output packages.adb.new *.apk
            
            echo '校验临时索引非空并替换正式索引...'
            test -s packages.adb.new
            mv packages.adb.new packages.adb
          "

      - name: Verify Repository Integrity
        run: |
          set -euo pipefail
          PACKAGE_DIR="$GITHUB_WORKSPACE/packages"
          shopt -s nullglob
          
          echo "==== 最终完整性断言检查 ===="
          for file in "$PACKAGE_DIR"/*.apk; do
              test -s "$file" || { echo "失败：发现空 APK 文件 $file"; exit 1; }
          done
          
          sb=("$PACKAGE_DIR"/sing-box_*openwrt_x86_64.apk)
          nc=("$PACKAGE_DIR"/npc-*_amd64.apk)
          nl=("$PACKAGE_DIR"/luci-app-npc*.apk)
          ni=("$PACKAGE_DIR"/luci-i18n-npc*.apk)
          sh=("$PACKAGE_DIR"/luci-app-shinra*.apk)
          
          [[ ${#sb[@]} -ge 1 && ${#sb[@]} -le 2 ]] || { echo "失败：sing-box 数量异常 (${#sb[@]})"; exit 1; }
          [[ ${#nc[@]} -eq 1 ]] || { echo "失败：npc 核心数量异常 (${#nc[@]})"; exit 1; }
          [[ ${#nl[@]} -eq 1 ]] || { echo "失败：luci-app-npc 数量异常 (${#nl[@]})"; exit 1; }
          [[ ${#ni[@]} -eq 1 ]] || { echo "失败：luci-i18n-npc 数量异常 (${#ni[@]})"; exit 1; }
          [[ ${#sh[@]} -eq 1 ]] || { echo "失败：luci-app-shinra 数量异常 (${#sh[@]})"; exit 1; }
          
          test -s "$PACKAGE_DIR/packages.adb" || { echo "失败：packages.adb 丢失或为空"; exit 1; }
          echo "仓库完整性检查全部通过！"

      - name: Commit and Push to Master
        run: |
          set -euo pipefail
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated feed sync and cleanup" && git push origin master)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
