name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点自动同步
  workflow_dispatch:

permissions:
  contents: write

# 加入全局重试策略，应对 GitHub 官方服务器不稳定的情况
defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 如果因为服务器问题失败，最多重试 3 次
          retries: 3 

      - name: Sync Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p packages
          cd packages
          
          echo "==== 开始抓取 sing-box ===="
          # 匹配规则：*openwrt_x86_64.apk
          gh release download SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber || echo "sing-box 暂无新版"
          
          echo "==== 开始抓取 nps-openwrt ===="
          # 匹配规则：抓取包含 luci-app-npc、luci-i18n-npc 以及 npc 的 x86_64/amd64 相关包
          gh release download djylb/nps-openwrt -p "luci-app-npc*.apk" --clobber || echo "luci-app-npc 下载失败"
          gh release download djylb/nps-openwrt -p "luci-i18n-npc*.apk" --clobber || echo "luci-i18n-npc 下载失败"
          gh release download djylb/nps-openwrt -p "npc-*_amd64.apk" --clobber || echo "npc_amd64 下载失败"

      - name: Generate and Sign ADB Index
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" > repo_private_key.pem
          chmod 600 repo_private_key.pem
          
          docker run --rm -v $(pwd):/work alpine:edge sh -c "
            apk add --no-cache --upgrade apk-tools
            cd /work/packages
            echo '正在使用纯正 apk v3 (mkndx) 生成索引并强制放行第三方包...'
            
            # 【关键修改】在 apk 和 mkndx 之间，加上 --allow-untrusted 全局放行参数
            apk --allow-untrusted mkndx --sign /work/repo_private_key.pem --output packages.adb *.apk
          "
          
          rm -f repo_private_key.pem

      - name: Commit and Push to Master
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/
          # 只有当文件夹内真的下载了新包或更新了索引，才提交代码
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动同步第三方最新的 APK 软件包" && git push origin master)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
