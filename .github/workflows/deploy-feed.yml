name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          retries: 3 

      - name: Sync Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p packages
          cd packages
          
          echo "==== 开始抓取 sing-box ===="
          # 利用 GitHub API 智能获取 sing-box 绝对最新的版本号（无视正式版/预览版限制）
          LATEST_SINGBOX=$(gh api repos/SagerNet/sing-box/releases | jq -r '.[0].tag_name')
          echo "检测到 sing-box 最新版本为: $LATEST_SINGBOX"
          
          # 【修复点】：增加了 -R 参数指定远程仓库，并精准指定了刚获取到的最新版本号
          gh release download "$LATEST_SINGBOX" -R SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber || echo "sing-box 下载失败"
          
          echo "==== 开始抓取 nps-openwrt ===="
          # nps 没有预览版机制，直接用 -R 参数抓取默认最新版即可
          gh release download -R djylb/nps-openwrt -p "luci-app-npc*.apk" --clobber || echo "luci-app-npc 下载失败"
          gh release download -R djylb/nps-openwrt -p "luci-i18n-npc*.apk" --clobber || echo "luci-i18n-npc 下载失败"
          gh release download -R djylb/nps-openwrt -p "npc-*_amd64.apk" --clobber || echo "npc_amd64 下载失败"

      - name: Generate and Sign ADB Index
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" > repo_private_key.pem
          chmod 600 repo_private_key.pem
          
          docker run --rm -v $(pwd):/work alpine:edge sh -c "
            apk add --no-cache --upgrade apk-tools
            cd /work/packages
            echo '正在使用纯正 apk v3 (mkndx) 生成索引并强制放行第三方包...'
            apk --allow-untrusted mkndx --sign /work/repo_private_key.pem --output packages.adb *.apk
          "
          
          rm -f repo_private_key.pem

      - name: Commit and Push to Master
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动同步第三方最新的 APK 软件包" && git push origin master)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
