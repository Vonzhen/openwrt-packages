name: Update OpenWrt APK Feed

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨 4 点自动维护
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          retries: 3 

      - name: Clean up old shinra versions
        run: |
          mkdir -p packages
          cd packages
          
          echo "==== 开始检查 shinra 插件版本 ===="
          shopt -s nullglob
          files=(luci-app-shinra*.apk)
          
          # 如果发现存在多个 shinra 包，启动清理逻辑
          if [ ${#files[@]} -gt 1 ]; then
            echo "发现多个 shinra 版本，开始自动清理旧版..."
            # 利用 ls -1v (Version sort) 按版本号自然排序，保留最后一个（即最新版）
            newest=$(ls -1v luci-app-shinra*.apk | tail -n 1)
            echo "保留最新版: $newest"
            
            # 删除其余旧版本
            for f in "${files[@]}"; do
              if [ "$f" != "$newest" ]; then
                echo "删除旧版: $f"
                rm -f "$f"
              fi
            done
          else
            echo "未发现冗余版本，无需清理。"
          fi

      - name: Sync Third-Party APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages
          
          echo "==== 开始抓取 sing-box ===="
          # 1. 精准抓取最新稳定版 (Stable)
          STABLE_SINGBOX=$(gh api repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')
          echo "检测到 sing-box 稳定版: $STABLE_SINGBOX"
          gh release download "$STABLE_SINGBOX" -R SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber || echo "稳定版下载失败"
          
          # 2. 抓取最新时间线版本（含 Alpha/Beta 测试版）
          LATEST_SINGBOX=$(gh api repos/SagerNet/sing-box/releases | jq -r '.[0].tag_name')
          echo "检测到 sing-box 最新版: $LATEST_SINGBOX"
          
          # 判断测试版是否与稳定版重合，如果不重合，则双轨下载
          if [ "$STABLE_SINGBOX" != "$LATEST_SINGBOX" ]; then
            gh release download "$LATEST_SINGBOX" -R SagerNet/sing-box -p "*openwrt_x86_64.apk" --clobber || echo "测试版下载失败"
          else
            echo "当前最新发布即为稳定版，无需重复下载。"
          fi
          
          echo "==== 开始抓取 nps-openwrt ===="
          gh release download -R djylb/nps-openwrt -p "luci-app-npc*.apk" --clobber || echo "luci-app-npc 下载失败"
          gh release download -R djylb/nps-openwrt -p "luci-i18n-npc*.apk" --clobber || echo "luci-i18n-npc 下载失败"
          gh release download -R djylb/nps-openwrt -p "npc-*_amd64.apk" --clobber || echo "npc_amd64 下载失败"

      - name: Generate and Sign ADB Index
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" > repo_private_key.pem
          chmod 600 repo_private_key.pem
          
          docker run --rm -v $(pwd):/work alpine:edge sh -c "
            apk add --no-cache --upgrade apk-tools
            cd /work/packages
            echo '正在使用纯正 apk v3 (mkndx) 生成索引并强制放行第三方包...'
            apk --allow-untrusted mkndx --sign /work/repo_private_key.pem --output packages.adb *.apk
          "
          
          rm -f repo_private_key.pem

      - name: Commit and Push to Master
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add packages/
          # 检查目录变动，如果是你手动扔了新 shinra 进来导致旧包被删，这里也会自动 Commit 这个删除动作
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动清理冗余版本并同步最新 APK" && git push origin master)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages
          branch: gh-pages
